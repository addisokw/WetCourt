model_list:
  # One multimodal model (Qwen3.6-35B-A3B-NVFP4 on vLLM) serves chat AND Frigate
  # vision under the single accurate name `qwen3.6-35b-a3b`. enable_thinking:false is
  # injected so callers (booth + Frigate genai, which can't set it themselves) get
  # direct answers, not reasoning tokens.
  - model_name: qwen3.6-35b-a3b
    litellm_params:
      model: openai/qwen3.6-nvfp4
      api_base: http://vllm-nvfp4:8000/v1
      api_key: dummy
      extra_body:
        chat_template_kwargs:
          enable_thinking: false

  - model_name: kokoro-tts
    litellm_params:
      model: openai/kokoro
      api_base: http://kokoro:8880/v1
      api_key: dummy
    model_info:
      mode: audio_speech

  - model_name: whisper-1
    litellm_params:
      model: openai/whisper-1
      api_base: http://parakeet:8082/v1
      api_key: dummy
    model_info:
      mode: audio_transcription

litellm_settings:
  drop_params: true
  set_verbose: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
