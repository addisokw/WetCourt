name: ai-stack

x-gpu: &gpu
  runtime: nvidia
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

networks:
  ai:
    driver: bridge

volumes:
  parakeet-cache: {}
  booth-logs: {}
  vllm-cache: {}   # persists vLLM's compiled CUDA graphs so restarts skip the ~2 min compile

services:
  # NVFP4 Qwen3.6-35B-A3B on vLLM — serves BOTH chat (qwen3.6-35b-a3b) and Frigate
  # vision (qwen3.6-35b-a3b alias) via litellm. NVFP4 uses Blackwell's FP4 tensor cores:
  # ~48% faster text decode than the old llama.cpp Q4, and multimodal in one model.
  # MoE backend auto-selects (MARLIN on SM121) — do NOT set VLLM_*MOE* env (breaks the
  # selection oracle on this container). First start compiles ~2 min (cached after).
  vllm-nvfp4:
    image: nvcr.io/nvidia/vllm:26.05.post1-py3
    container_name: vllm-nvfp4
    restart: unless-stopped
    networks: [ai]
    <<: *gpu
    ipc: host
    environment:
      VLLM_CACHE_ROOT: /cache
    volumes:
      - ${LLAMA_MODEL_DIR}:/models:ro
      - vllm-cache:/cache
    command:
      - vllm
      - serve
      - /models/Qwen3.6-35B-A3B-NVFP4
      - --served-model-name
      - qwen3.6-nvfp4
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --quantization
      - modelopt
      - --gpu-memory-utilization
      - "0.5"
      - --max-model-len
      - "16384"
      - --kv-cache-dtype
      - fp8_e4m3
      - --reasoning-parser
      - qwen3
      # MoE backend is left to vLLM's auto-oracle (picks MARLIN weight-only FP4 on sm_121).
      # We tested forcing native FP4 via `--moe-backend flashinfer_b12x`: it loads but gives
      # IDENTICAL single-stream decode (71.0 vs 70.7 tok/s) because decode is memory-bandwidth
      # bound, not compute bound — native FP4 only helps compute-bound high-concurrency/large
      # prefill. Add `--moe-backend flashinfer_b12x` if the booth ever needs high batch.
    ports:
      - "0.0.0.0:8003:8000"

  parakeet:
    image: local/parakeet:latest
    container_name: parakeet
    restart: unless-stopped
    networks: [ai]
    <<: *gpu
    ipc: host
    environment:
      HF_HOME: /hf-cache
    volumes:
      - parakeet-cache:/hf-cache

  kokoro:
    image: kokoro-tts-arm64:latest
    container_name: kokoro
    restart: unless-stopped
    networks: [ai]
    <<: *gpu
    environment:
      USE_GPU: "true"
      DEVICE: cuda


  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm
    restart: unless-stopped
    networks: [ai]
    depends_on:
      - vllm-nvfp4
      - parakeet
      - kokoro
    ports:
      - "0.0.0.0:${LITELLM_PORT}:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]

  # Host networking on purpose (like counsel): the MCU fleet dials the TCP
  # listener on :8090, and the UDP discovery beacon broadcasts to
  # 255.255.255.255:8091 — broadcast doesn't cross the bridge network's NAT,
  # so in bridge mode the beacon-discovery NanoC6s would never find the Spark.
  # It reaches litellm/vision/counsel via their host ports (127.0.0.1).
  # Host ports used: 8080 (console), 8090 (MCU TCP).
  orchestrator:
    image: local/booth-orchestrator:latest
    build:
      context: ../orchestrator
    container_name: orchestrator
    restart: unless-stopped
    network_mode: host
    depends_on:
      - litellm
    environment:
      BOOTH__INFERENCE__API_KEY: ${LITELLM_MASTER_KEY}
      RUST_LOG: info
    volumes:
      - ../orchestrator/config.toml:/app/config.toml:ro
      # Writable: persona Save and crime curation persist back into the checkout.
      - ../orchestrator/personas:/app/personas
      - ../orchestrator/crimes:/app/crimes
      # Writable: console-tuned per-device calibration (squirt fire_ms, vision
      # gains/boresight, servo trims) — without this mount every container
      # rebuild silently reverts to defaults.
      - ../orchestrator/calibration:/app/calibration
      # Writable: custom print templates saved from the console's Print tab.
      - ../orchestrator/print_templates.json:/app/print_templates.json
      # Guilty-moment capture frames ([capture] dir in config.toml).
      - ../orchestrator/captures:/app/captures
      - booth-logs:/var/log/booth

  # Turret vision (webcam bolted to the gun → pose detection → /feed + /state).
  # Host networking like counsel/orchestrator: the orchestrator proxies it at
  # 127.0.0.1:8091 and it streams aim back to the console at 127.0.0.1:8080.
  # CPU-only. The webcam must be plugged into the Spark itself.
  vision:
    image: local/booth-vision:latest
    build:
      context: ../vision
    container_name: vision
    restart: unless-stopped
    network_mode: host
    devices:
      - "/dev/video0:/dev/video0"
    environment:
      BOOTH_VISION_PORT: "8091"
      BOOTH_VISION_ORCH: http://127.0.0.1:8080
    volumes:
      # Pre-downloaded pose model (vision/models/pose_landmarker_lite.task):
      # no internet needed at the venue. Tuning (gains/boresight/target) is
      # NOT stored here — the orchestrator re-pushes the saved values from
      # calibration/vision.toml whenever this service (re)starts.
      - ../vision/models:/app/models

  # Call-your-lawyer phone (SIP endpoint for the booth's HT801 + analog
  # phone). Host networking on purpose: SIP advertises real IPs inside
  # SDP/Contact and RTP uses a UDP port range — bridge mode would need every
  # port mapped plus advertise-IP overrides. It reaches litellm and the
  # orchestrator via their host-published ports (127.0.0.1:4000 / :8080).
  counsel:
    image: local/booth-counsel:latest
    build:
      context: ../orchestrator
      dockerfile: Dockerfile.counsel
    container_name: counsel
    restart: unless-stopped
    network_mode: host
    depends_on:
      - litellm
    environment:
      COUNSEL__INFERENCE__API_KEY: ${LITELLM_MASTER_KEY}
      COUNSEL__INFERENCE__BASE_URL: http://127.0.0.1:${LITELLM_PORT}
      RUST_LOG: info
    volumes:
      - ../orchestrator/crates/counsel/config.toml:/app/config.toml:ro
      - ../orchestrator/crates/counsel/personas:/app/personas:ro
      - ../orchestrator/crates/counsel/assets:/app/assets:ro
