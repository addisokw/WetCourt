name: ai-stack

x-gpu: &gpu
  runtime: nvidia
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

networks:
  ai:
    driver: bridge

volumes:
  parakeet-cache: {}
  booth-logs: {}

services:
  llama-server:
    image: local/llama.cpp:server-cuda-fresh
    build:
      context: ${LLAMA_BUILD_CONTEXT}
      dockerfile: ${PWD:-.}/llama-cpp/Dockerfile
    container_name: llama-server
    restart: unless-stopped
    networks: [ai]
    <<: *gpu
    volumes:
      - ${LLAMA_MODEL_DIR}:/models:ro
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --jinja
      - --flash-attn
      - "on"
      - --n-gpu-layers
      - "${LLAMA_NGL}"
      - --ctx-size
      - "${LLAMA_CTX}"
      - --alias
      - qwen3.6-35b-a3b
      - -m
      - /models/${LLAMA_MODEL_FILE}

  parakeet:
    image: local/parakeet:latest
    container_name: parakeet
    restart: unless-stopped
    networks: [ai]
    <<: *gpu
    ipc: host
    environment:
      HF_HOME: /hf-cache
    volumes:
      - parakeet-cache:/hf-cache

  kokoro:
    image: kokoro-tts-arm64:latest
    container_name: kokoro
    restart: unless-stopped
    networks: [ai]
    <<: *gpu
    environment:
      USE_GPU: "true"
      DEVICE: cuda

  # Feasibility spike (feat/a2f-3d-spike). Internal-only; orchestrator talks to
  # it at ws://audio2face:9000/v1/face/stream. Swap `image:` to
  # nvcr.io/nim/nvidia/audio2face-3d if NIM ends up working on this hardware.
  audio2face:
    image: local/audio2face:latest
    build:
      context: ./audio2face
    container_name: audio2face
    restart: unless-stopped
    networks: [ai]
    <<: *gpu
    environment:
      A2F_MODE: cuda
      A2F_CHARACTER: claire

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm
    restart: unless-stopped
    networks: [ai]
    depends_on:
      - llama-server
      - parakeet
      - kokoro
    ports:
      - "0.0.0.0:${LITELLM_PORT}:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]

  orchestrator:
    image: local/booth-orchestrator:latest
    build:
      context: ../orchestrator
    container_name: orchestrator
    restart: unless-stopped
    networks: [ai]
    depends_on:
      - litellm
    ports:
      - "0.0.0.0:8080:8080"
    # Phase 4 will plug in the microcontroller; uncomment when ready:
    # devices:
    #   - "/dev/ttyUSB0:/dev/ttyUSB0"
    environment:
      BOOTH__INFERENCE__API_KEY: ${LITELLM_MASTER_KEY}
      RUST_LOG: info
    volumes:
      - ../orchestrator/config.toml:/app/config.toml:ro
      - booth-logs:/var/log/booth
