name: ai-stack

x-gpu: &gpu
  runtime: nvidia
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

networks:
  ai:
    driver: bridge

volumes:
  parakeet-cache: {}
  booth-logs: {}
  vllm-cache: {}   # persists vLLM's compiled CUDA graphs so restarts skip the ~2 min compile

services:
  # NVFP4 Qwen3.6-35B-A3B on vLLM — serves BOTH chat (qwen3.6-35b-a3b) and Frigate
  # vision (qwen3-vl alias) via litellm. NVFP4 uses Blackwell's FP4 tensor cores:
  # ~48% faster text decode than the old llama.cpp Q4, and multimodal in one model.
  # MoE backend auto-selects (MARLIN on SM121) — do NOT set VLLM_*MOE* env (breaks the
  # selection oracle on this container). First start compiles ~2 min (cached after).
  vllm-nvfp4:
    image: nvcr.io/nvidia/vllm:26.05.post1-py3
    container_name: vllm-nvfp4
    restart: unless-stopped
    networks: [ai]
    <<: *gpu
    ipc: host
    environment:
      VLLM_CACHE_ROOT: /cache
    volumes:
      - ${LLAMA_MODEL_DIR}:/models:ro
      - vllm-cache:/cache
    command:
      - vllm
      - serve
      - /models/Qwen3.6-35B-A3B-NVFP4
      - --served-model-name
      - qwen3.6-nvfp4
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --quantization
      - modelopt
      - --gpu-memory-utilization
      - "0.5"
      - --max-model-len
      - "16384"
      - --kv-cache-dtype
      - fp8_e4m3
      - --reasoning-parser
      - qwen3
      # MoE backend is left to vLLM's auto-oracle (picks MARLIN weight-only FP4 on sm_121).
      # We tested forcing native FP4 via `--moe-backend flashinfer_b12x`: it loads but gives
      # IDENTICAL single-stream decode (71.0 vs 70.7 tok/s) because decode is memory-bandwidth
      # bound, not compute bound — native FP4 only helps compute-bound high-concurrency/large
      # prefill. Add `--moe-backend flashinfer_b12x` if the booth ever needs high batch.
    ports:
      - "0.0.0.0:8003:8000"

  parakeet:
    image: local/parakeet:latest
    container_name: parakeet
    restart: unless-stopped
    networks: [ai]
    <<: *gpu
    ipc: host
    environment:
      HF_HOME: /hf-cache
    volumes:
      - parakeet-cache:/hf-cache

  kokoro:
    image: kokoro-tts-arm64:latest
    container_name: kokoro
    restart: unless-stopped
    networks: [ai]
    <<: *gpu
    environment:
      USE_GPU: "true"
      DEVICE: cuda


  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm
    restart: unless-stopped
    networks: [ai]
    depends_on:
      - vllm-nvfp4
      - parakeet
      - kokoro
    ports:
      - "0.0.0.0:${LITELLM_PORT}:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]

  orchestrator:
    image: local/booth-orchestrator:latest
    build:
      context: ../orchestrator
    container_name: orchestrator
    restart: unless-stopped
    networks: [ai]
    depends_on:
      - litellm
    ports:
      - "0.0.0.0:8080:8080"
    # Phase 4 will plug in the microcontroller; uncomment when ready:
    # devices:
    #   - "/dev/ttyUSB0:/dev/ttyUSB0"
    environment:
      BOOTH__INFERENCE__API_KEY: ${LITELLM_MASTER_KEY}
      RUST_LOG: info
    volumes:
      - ../orchestrator/config.toml:/app/config.toml:ro
      - booth-logs:/var/log/booth
