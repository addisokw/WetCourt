# Dev config — orchestrator runs locally with `cargo run`, mocks everything.
# No Spark, no microcontroller, no audio playback required.

[inference]
# "real" hits LiteLLM. "mock" uses canned responses with simulated latency
# (no network) — set this when working offline from the Spark.
mode = "real"
# Point base_url at your Spark's reachable address — its Tailscale IP / MagicDNS
# name, or LAN IP. Keep real infra out of this committed file: prefer setting it
# at runtime with BOOTH__INFERENCE__BASE_URL, or edit the placeholder below.
# api_key is read from BOOTH__INFERENCE__API_KEY, which main.rs auto-populates
# from LITELLM_MASTER_KEY in a `.env` (repo root or dgx-ai-stack/.env).
base_url = "http://your-spark:4000"
chat_model = "qwen3.6-35b-a3b"
stt_model = "whisper-1"
tts_model = "kokoro-tts"
tts_voice = "bm_george"
charge_timeout_secs = 10
verdict_first_token_timeout_secs = 15
verdict_total_timeout_secs = 30
stt_timeout_secs = 5
tts_timeout_secs = 10
enable_thinking = false

[hardware]
# "mock" cycles synthetic acks. "tcp" listens for the MCU on `bind_addr`
# (it dials in over WiFi). "serial" is a future Phase 4 USB driver.
driver = "tcp"
#driver = "mock"
serial_port = "COM4"        # ignored when driver != "serial"
baud = 115200
ack_timeout_ms = 3000
bind_addr = "0.0.0.0:8090"

[mock_hw]
ack_latency_ms = 50
fail_rate = 0.0
simulate_estop_after_secs = 0

[mock_inference]
charge_latency_ms = 800
transcribe_latency_ms = 400
deliberate_latency_ms = 1200
tts_latency_ms = 200

[squirt]
# The squirt gun is binary: every guilty verdict fires for this fixed
# duration (ms).
duration_ms = 150

[crimes]
# Charges are drawn from this curated list (path relative to this file).
# source = "llm" restores legacy on-the-fly generation; operator-queued
# charges take precedence either way.
file = "crimes/wet_court_crimes.json"
source = "list"
no_repeat_window = 15

[trial]
plea_window_secs = 20
charge_display_secs = 5
cooldown_secs = 4
guilty_bias = 0.7

[cross_examination]
# After the defense, the judge asks one pointed follow-up question and the
# defendant gets answer_window_secs to respond before the verdict. The
# operator console can toggle this live; `enabled` here is just the startup
# default. Skipped automatically when the defendant offered no plea.
enabled = true
answer_window_secs = 10
question_timeout_secs = 12

[display]
listen_addr = "0.0.0.0:8080"

[logging]
level = "info,booth=debug"
log_file = "./booth.log"
transcripts_jsonl = "./transcripts.jsonl"

# Thermal-printer keepsake transcript handed to defendants. The casebook trial
# log (transcripts_jsonl above) is written regardless; this governs the physical
# receipt only. mode: "off" | "mock" (render, no USB) | "real" (send to USB).
# qr_url and booth_location are meant to be edited on-site as the booth moves.
[printer]
mode = "mock"
width_dots = 576
qr_url = "https://wetcourt.lol"
booth_location = "Find the Wet Court near you"
