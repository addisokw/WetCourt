# Dev config — orchestrator runs locally with `cargo run`, mocks everything.
# No Spark, no microcontroller, no audio playback required.

[inference]
# Unused in Phase 1 (mocks). Kept so Phase 2 can flip a single field.
base_url = "http://dgx-spark.local:4000"
chat_model = "qwen3.6-35b-a3b"
stt_model = "whisper-1"
tts_model = "kokoro-tts"
tts_voice = "bm_george"
charge_timeout_secs = 10
verdict_first_token_timeout_secs = 15
verdict_total_timeout_secs = 30
stt_timeout_secs = 5
tts_timeout_secs = 10
enable_thinking = false

[hardware]
driver = "mock"
serial_port = "COM3"        # ignored when driver = "mock"
baud = 115200
ack_timeout_ms = 3000

[mock_hw]
ack_latency_ms = 50
fail_rate = 0.0
simulate_estop_after_secs = 0

[mock_inference]
charge_latency_ms = 800
transcribe_latency_ms = 400
deliberate_latency_ms = 1200
tts_latency_ms = 200

[squirt_intensity]
level_1 = 60
level_2 = 100
level_3 = 150
level_4 = 200
level_5 = 280

[trial]
plea_window_secs = 20
charge_display_secs = 5
cooldown_secs = 4
guilty_bias = 0.7

[display]
listen_addr = "127.0.0.1:8080"

[logging]
level = "info,booth=debug"
log_file = "./booth.log"
transcripts_jsonl = "./transcripts.jsonl"
