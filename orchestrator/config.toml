# Production config — orchestrator container on the DGX Spark.
# Talks to LiteLLM over the private docker network. Real microcontroller on USB.

[inference]
mode = "real"
base_url = "http://litellm:4000"
chat_model = "qwen3.6-35b-a3b"
stt_model = "whisper-1"
tts_model = "kokoro-tts"
tts_voice = "bm_george"
charge_timeout_secs = 10
verdict_first_token_timeout_secs = 15
verdict_total_timeout_secs = 30
stt_timeout_secs = 5
tts_timeout_secs = 10
enable_thinking = false

[hardware]
driver = "tcp"
serial_port = "/dev/ttyUSB0"
baud = 115200
ack_timeout_ms = 3000
# MCU dials the orchestrator over WiFi using the line protocol from §5.2.
bind_addr = "0.0.0.0:8090"

[mock_hw]
ack_latency_ms = 50
fail_rate = 0.0
simulate_estop_after_secs = 0

[mock_inference]
charge_latency_ms = 800
transcribe_latency_ms = 400
deliberate_latency_ms = 1200
tts_latency_ms = 200

[squirt]
# The squirt gun is binary: every guilty verdict fires for this fixed
# duration (ms).
duration_ms = 150

[crimes]
# Curated charge list (dir mounted into the container; operator edits
# persist back into the repo checkout via the bind mount).
file = "crimes/wet_court_crimes.json"
source = "list"
no_repeat_window = 15

[trial]
plea_window_secs = 20
charge_display_secs = 5
cooldown_secs = 4
guilty_bias = 0.7

[cross_examination]
# After the defense, the judge asks one pointed follow-up question and the
# defendant gets answer_window_secs to respond before the verdict. The
# operator console can toggle this live; `enabled` here is just the startup
# default. Skipped automatically when the defendant offered no plea.
enabled = true
answer_window_secs = 10
question_timeout_secs = 12

[display]
listen_addr = "0.0.0.0:8080"

[logging]
level = "info"
log_file = "/var/log/booth/booth.log"
transcripts_jsonl = "/var/log/booth/transcripts.jsonl"
