role = "turret"
# Pan/tilt aim only — firing lives on the `squirt` role (calibration/squirt.toml).

[pan]
min = 1000
max = 2000
center = 1500
invert = false
limit_min_deg = -90.0
limit_max_deg = 90.0

[tilt]
min = 1000
max = 2000
center = 1500
invert = false
limit_min_deg = -45.0
limit_max_deg = 45.0
