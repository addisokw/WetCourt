# Event/production config: counsel runs on the Spark with host networking,
# next to LiteLLM and the orchestrator. Override any field with COUNSEL__ env
# vars (e.g. COUNSEL__SIP__ADVERTISE_IP).

[sip]
bind = "0.0.0.0:5060"
# Booth LAN IP of the Spark; leave empty to auto-detect the outbound address.
advertise_ip = ""
ata_user = "defendant"
lawyer_user = "1"

[rtp]
port_min = 40000
port_max = 40099

[audio]
# F5: POST the lawyer's audio to the orchestrator for booth-speaker playback
# (needs orchestrator [lawyer] speaker_playback too). OFF until a hardware pass.
speaker_playback = false
vad_rms_threshold = 100.0
vad_hangover_ms = 700
silence_reprompt_secs = 12
max_call_secs = 180
# Back-and-forths before a scripted mishap (persona hangup_lines) ends the call.
max_exchanges = 2
# Linear gain on the lawyer's TTS voice (1.0 = unity); soft-clipped, so
# modest boosts (1.5–2.0) stay clean on a quiet handset.
tts_gain = 1.0

[inference]
mode = "real"
base_url = "http://127.0.0.1:4000"
chat_model = "qwen3.6-35b-a3b"
stt_model = "whisper-1"
tts_model = "kokoro-tts"

[persona]
file = "personas/lawyer.toml"
assets_dir = "assets"

[trial_context]
enabled = true
orchestrator_base_url = "http://127.0.0.1:8080"

# Secret phone-keypad operator console: with the court idle, '#' + code on the
# handset arms an orchestrator mode (e.g. #42 = force acquittal) for the next
# trial. Codes commit on '#' or after inter_digit_ms of silence.
[operator]
enabled = true
inter_digit_ms = 3000

[control]
bind = "0.0.0.0:8092"

[logging]
level = "counsel=debug,info"
